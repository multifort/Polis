<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1424" viewBox="0 0 1480 1424" font-family="PingFang SC, Microsoft YaHei, Hiragino Sans GB, sans-serif">
  <defs>
    <marker id="ctrl" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1f3a5f"/></marker>
    <marker id="data" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1565c0"/></marker>
    <marker id="inj"  markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2e7d32"/></marker>
    <marker id="hum"  markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#b26a00"/></marker>
    <marker id="humS" markerWidth="11" markerHeight="11" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6 Z" fill="#b26a00"/></marker>
  </defs>

  <rect x="0" y="0" width="1480" height="1424" fill="#ffffff"/>
  <text x="740" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">多智能体平台 — 业务与数据交互图</text>
  <text x="740" y="62" text-anchor="middle" font-size="13" fill="#64748b">规划层拆任务 → 编排层分派 → 角色层执行；Worker 无状态，运行时注入三样（上下文切片 / 技能 / 模型配置+凭证）</text>

  <!-- ===== 入口·组织 band（本轮新增，不随下方平移）===== -->
  <rect x="160" y="74" width="1300" height="74" rx="10" fill="#fff7ed" stroke="#fdba74"/>
  <rect x="20" y="74" width="130" height="74" rx="8" fill="#c2410c"/>
  <text x="85" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">入口·组织</text>
  <rect x="180" y="88" width="250" height="46" rx="8" fill="#ffffff" stroke="#fb923c"/>
  <text x="305" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">onboarding 问答</text>
  <text x="305" y="125" text-anchor="middle" font-size="10" fill="#9a3412">理解场景 / 偏好</text>
  <line x1="430" y1="111" x2="466" y2="111" stroke="#9a3412" stroke-width="1.8" marker-end="url(#ctrl)"/>
  <rect x="470" y="88" width="330" height="46" rx="8" fill="#ffffff" stroke="#fb923c"/>
  <text x="635" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">角色编配器</text>
  <text x="635" y="124" text-anchor="middle" font-size="10" fill="#9a3412">匹配场景预设 · 组装 · 缺口自动生成(需人审)</text>
  <line x1="800" y1="111" x2="836" y2="111" stroke="#9a3412" stroke-width="1.8" marker-end="url(#ctrl)"/>
  <text x="819" y="84" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412">建/填充</text>
  <rect x="840" y="83" width="600" height="56" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="1140" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">组织 / 虚拟公司 (Org)</text>
  <text x="1140" y="124" text-anchor="middle" font-size="10" fill="#92400e">角色花名册 · 组织记忆 · 启用技能 · 凭证/预算 · 治理策略 · 共享工作区</text>
  <text x="810" y="160" text-anchor="middle" font-size="10.5" fill="#b45309">↓ 下面的「用户层 / 控制面 / 执行…」都发生在某个 Org 内（Org = 管理/资源/治理边界，非执行拓扑；管理者 = planner+Temporal）</text>

  <!-- 以下原有内容整体下移 92px（保持内部箭头坐标不变） -->
  <g transform="translate(0,92)">

  <!-- ===== Layer bands ===== -->
  <g>
    <rect x="160" y="70"  width="1300" height="80"  rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
    <rect x="160" y="165" width="1300" height="120" rx="10" fill="#eef7ff" stroke="#bae6fd"/>
    <rect x="160" y="300" width="1300" height="72"  rx="10" fill="#fff4e6" stroke="#fed7aa"/>
    <rect x="160" y="388" width="1300" height="92"  rx="10" fill="#eafaf1" stroke="#bbf7d0"/>
    <rect x="160" y="496" width="1300" height="110" rx="10" fill="#fdf0f5" stroke="#fbcfe8"/>
    <rect x="160" y="622" width="1300" height="104" rx="10" fill="#f3eefe" stroke="#ddd6fe"/>
    <rect x="160" y="742" width="1300" height="92"  rx="10" fill="#eef2f5" stroke="#cbd5e1"/>
  </g>
  <!-- Left labels -->
  <g font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">
    <rect x="20" y="70"  width="130" height="80"  rx="8" fill="#475569"/><text x="85" y="115">用户层</text>
    <rect x="20" y="165" width="130" height="120" rx="8" fill="#0369a1"/><text x="85" y="230">控制面</text>
    <rect x="20" y="300" width="130" height="72"  rx="8" fill="#c2740c"/><text x="85" y="340">编排层</text>
    <rect x="20" y="388" width="130" height="92"  rx="8" fill="#15803d"/><text x="85" y="438">协同支撑</text>
    <rect x="20" y="496" width="130" height="110" rx="8" fill="#be185d"/><text x="85" y="555">执行层</text>
    <rect x="20" y="622" width="130" height="104" rx="8" fill="#6d28d9"/><text x="85" y="678">模型接入</text>
    <rect x="20" y="742" width="130" height="92"  rx="8" fill="#475569"/><text x="85" y="792">数据面</text>
  </g>

  <!-- ===== A 用户 ===== -->
  <g>
    <rect x="600" y="85" width="420" height="50" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="810" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">用户</text>
    <text x="810" y="124" text-anchor="middle" font-size="11" fill="#64748b">提交目标 · 计划确认 / 审核 / 干预（在所属 Org 内）</text>
  </g>

  <!-- ===== B 控制面 ===== -->
  <g font-size="13" font-weight="700" fill="#075985">
    <rect x="205"  y="188" width="280" height="74" rx="8" fill="#ffffff" stroke="#0ea5e9"/><text x="345"  y="220" text-anchor="middle">角色注册表</text><text x="345" y="240" text-anchor="middle" font-size="10.5" fill="#64748b" font-weight="400">提示词+技能+能力</text>
    <rect x="515"  y="188" width="280" height="74" rx="8" fill="#ffffff" stroke="#0ea5e9"/><text x="655"  y="220" text-anchor="middle">模板库</text><text x="655" y="240" text-anchor="middle" font-size="10.5" fill="#64748b" font-weight="400">预写好的 Plan(DAG)</text>
    <rect x="825"  y="188" width="280" height="74" rx="8" fill="#ffffff" stroke="#0ea5e9"/><text x="965"  y="220" text-anchor="middle">规划器</text><text x="965" y="240" text-anchor="middle" font-size="10.5" fill="#64748b" font-weight="400">模板填充 / LLM 拆解</text>
    <rect x="1135" y="188" width="280" height="74" rx="8" fill="#ffffff" stroke="#0ea5e9"/><text x="1275" y="220" text-anchor="middle">人审 UI</text><text x="1275" y="240" text-anchor="middle" font-size="10.5" fill="#64748b" font-weight="400">确认/审核/干预·看成本</text>
  </g>

  <!-- ===== C 编排 ===== -->
  <rect x="360" y="315" width="900" height="44" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="810" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">Temporal 编排引擎 — DAG 调度 · 串/并 · 重试 · 人审暂停 · signal 干预</text>

  <!-- ===== D 协同支撑 ===== -->
  <g>
    <rect x="300" y="405" width="440" height="60" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
    <text x="520" y="430" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Context Manager 上下文管家</text>
    <text x="520" y="450" text-anchor="middle" font-size="10.5" fill="#64748b">持有全局上下文 · 切片下发 · 收结果信封 · 维护台账/出处</text>
    <rect x="860" y="405" width="440" height="60" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
    <text x="1080" y="430" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Skill 库</text>
    <text x="1080" y="450" text-anchor="middle" font-size="10.5" fill="#64748b">注册·版本·信任·检索 + 自动生成/验证沙箱（Markdown 手册）</text>
  </g>

  <!-- ===== E 执行层 ===== -->
  <g>
    <rect x="300" y="505" width="1020" height="92" rx="8" fill="#ffffff" stroke="#ec4899" stroke-width="1.5"/>
    <text x="320" y="525" font-size="13" font-weight="700" fill="#be185d">执行层 · 无状态 · 可插拔 Executor（skill 与运行时无关 · 注入：切片/技能/模型+凭证）</text>
    <rect x="320" y="540" width="235" height="46" rx="6" fill="#fce4ef" stroke="#ec4899" stroke-width="1.4"/><text x="437" y="560" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9d174d">lite-agent</text><text x="437" y="577" text-anchor="middle" font-size="10" fill="#9d174d">默认 · 轻量自研</text>
    <rect x="575" y="540" width="235" height="46" rx="6" fill="#fde7f1" stroke="#f472b6"/><text x="692" y="560" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9d174d">纯 LLM</text><text x="692" y="577" text-anchor="middle" font-size="10" fill="#9d174d">一次调用 · 无工具</text>
    <rect x="830" y="540" width="235" height="46" rx="6" fill="#fde7f1" stroke="#f472b6"/><text x="947" y="560" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9d174d">媒体生成器</text><text x="947" y="577" text-anchor="middle" font-size="10" fill="#9d174d">图 / 视频</text>
    <rect x="1085" y="540" width="215" height="46" rx="6" fill="#f3f4f6" stroke="#9ca3af"/><text x="1192" y="560" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4b5563">hermes</text><text x="1192" y="577" text-anchor="middle" font-size="10" fill="#6b7280">可选备用 · 偏重</text>
  </g>

  <!-- ===== F 模型接入 ===== -->
  <g>
    <rect x="300" y="640" width="300" height="70" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="450" y="668" text-anchor="middle" font-size="13.5" font-weight="700" fill="#6d28d9">Model Router</text>
    <text x="450" y="688" text-anchor="middle" font-size="10.5" fill="#64748b">按能力+预算解析模型</text>
    <rect x="640" y="640" width="300" height="70" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="790" y="668" text-anchor="middle" font-size="13.5" font-weight="700" fill="#6d28d9">Credential Broker</text>
    <text x="790" y="688" text-anchor="middle" font-size="10.5" fill="#64748b">信封加密·任务级短时凭证</text>
    <rect x="980" y="640" width="300" height="70" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="1130" y="668" text-anchor="middle" font-size="13.5" font-weight="700" fill="#6d28d9">模型后端（各家·BYO Key）</text>
    <text x="1130" y="688" text-anchor="middle" font-size="10.5" fill="#64748b">声明式 HTTP 连接器 + 薄适配器</text>
  </g>

  <!-- ===== G 数据面 ===== -->
  <g>
    <rect x="300" y="758" width="440" height="60" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
    <text x="520" y="783" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">共享卷（任务工作目录）</text>
    <text x="520" y="803" text-anchor="middle" font-size="10.5" fill="#64748b">任意模态产物：网页/数据集/报告/图/视频</text>
    <rect x="860" y="758" width="440" height="60" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
    <text x="1080" y="783" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">DB（结构化）</text>
    <text x="1080" y="803" text-anchor="middle" font-size="10.5" fill="#64748b">角色·计划·产物描述符台账(出处)·凭证密文</text>
  </g>

  <!-- ===== Arrows ===== -->
  <!-- 1 用户→规划器 -->
  <line x1="810" y1="135" x2="940" y2="186" stroke="#1f3a5f" stroke-width="1.8" marker-end="url(#ctrl)"/>
  <text x="838" y="158" font-size="11.5" font-weight="700" fill="#1f3a5f">① 提交目标</text>
  <!-- 2 规划器↔模板库 -->
  <line x1="822" y1="222" x2="798" y2="222" stroke="#1f3a5f" stroke-width="1.8" marker-end="url(#ctrl)" marker-start="url(#ctrl)"/>
  <text x="660" y="152" font-size="11.5" font-weight="700" fill="#1f3a5f">② 模板检索/填充 · 或 LLM 拆解</text>
  <!-- 3a 规划器→人审 -->
  <line x1="1108" y1="222" x2="1132" y2="222" stroke="#1f3a5f" stroke-width="1.8" marker-end="url(#ctrl)"/>
  <text x="1120" y="155" font-size="11.5" font-weight="700" fill="#1f3a5f">③ Plan(DAG)+预估成本</text>
  <!-- 3c 用户↔人审 -->
  <line x1="1020" y1="108" x2="1150" y2="186" stroke="#b26a00" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#hum)" marker-start="url(#humS)"/>
  <text x="1028" y="100" font-size="11" font-weight="700" fill="#b26a00">确认 / 干预</text>
  <!-- 3b+9 人审↔Temporal -->
  <line x1="1262" y1="262" x2="1175" y2="313" stroke="#b26a00" stroke-width="1.7" stroke-dasharray="5 4" marker-end="url(#hum)" marker-start="url(#humS)"/>
  <text x="1180" y="292" font-size="11" font-weight="700" fill="#b26a00">③批准→执行 / ⑨审核断点·signal</text>
  <!-- 4 Temporal→执行层 -->
  <line x1="700" y1="359" x2="700" y2="503" stroke="#1f3a5f" stroke-width="2" marker-end="url(#ctrl)"/>
  <text x="712" y="440" font-size="11.5" font-weight="700" fill="#1f3a5f">④ 按 DAG 派发（串/并）</text>
  <!-- 5a Context→Worker (inject down) -->
  <line x1="470" y1="465" x2="470" y2="503" stroke="#2e7d32" stroke-width="1.8" stroke-dasharray="2 3" marker-end="url(#inj)"/>
  <text x="300" y="490" font-size="11" font-weight="700" fill="#2e7d32">⑤ 上下文切片</text>
  <!-- 8a Worker→Context (envelope up) -->
  <line x1="560" y1="503" x2="560" y2="467" stroke="#1565c0" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#data)"/>
  <text x="568" y="492" font-size="11" font-weight="700" fill="#1565c0">⑧ 结果信封</text>
  <!-- 5b Skill→Worker -->
  <line x1="1080" y1="465" x2="1080" y2="503" stroke="#2e7d32" stroke-width="1.8" stroke-dasharray="2 3" marker-end="url(#inj)"/>
  <text x="1092" y="490" font-size="11" font-weight="700" fill="#2e7d32">⑤ 启用技能</text>
  <!-- 5c ModelRouter→Worker (inject up) -->
  <line x1="450" y1="640" x2="450" y2="599" stroke="#2e7d32" stroke-width="1.8" stroke-dasharray="2 3" marker-end="url(#inj)"/>
  <text x="300" y="628" font-size="10.5" font-weight="700" fill="#2e7d32">⑤ 模型配置</text>
  <!-- 5d Broker→Worker -->
  <line x1="790" y1="640" x2="790" y2="599" stroke="#2e7d32" stroke-width="1.8" stroke-dasharray="2 3" marker-end="url(#inj)"/>
  <text x="700" y="628" font-size="10.5" font-weight="700" fill="#2e7d32">⑤ 短时凭证(用完即焚)</text>
  <!-- 6 Router→后端 (bottom route) -->
  <polyline points="450,710 450,720 1130,720 1130,710" fill="none" stroke="#1565c0" stroke-width="1.7" stroke-dasharray="6 3" marker-end="url(#data)"/>
  <text x="600" y="715" font-size="11" font-weight="700" fill="#1565c0">⑥ HTTP 连接器调用 · 解析结果</text>
  <!-- 7 Worker→共享卷 (channel x=615) -->
  <line x1="615" y1="599" x2="615" y2="756" stroke="#1565c0" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#data)"/>
  <text x="624" y="690" font-size="11" font-weight="700" fill="#1565c0">⑦ 写产物</text>
  <!-- 8b Context→DB (right channel) -->
  <polyline points="740,440 1430,440 1430,788 1302,788" fill="none" stroke="#1565c0" stroke-width="1.7" stroke-dasharray="6 3" marker-end="url(#data)"/>
  <text x="1300" y="430" font-size="11" font-weight="700" fill="#1565c0">⑧ 写台账（事实+出处+摘要）</text>

  <!-- ===== Legend ===== -->
  <rect x="160" y="858" width="1300" height="120" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="180" y="884" font-size="14" font-weight="700" fill="#0f172a">图例 &amp; 一圈数据流</text>
  <g font-size="12" fill="#334155">
    <line x1="180" y1="906" x2="230" y2="906" stroke="#1f3a5f" stroke-width="2" marker-end="url(#ctrl)"/><text x="240" y="910">控制流（调度/派发/批准）</text>
    <line x1="180" y1="930" x2="230" y2="930" stroke="#1565c0" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#data)"/><text x="240" y="934">数据流（产物/信封/台账/模型调用）</text>
    <line x1="180" y1="954" x2="230" y2="954" stroke="#2e7d32" stroke-width="2" stroke-dasharray="2 3" marker-end="url(#inj)"/><text x="240" y="958">运行时注入（切片/技能/模型/凭证）</text>
    <line x1="560" y1="954" x2="610" y2="954" stroke="#b26a00" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#hum)"/><text x="620" y="958">人审 / 人工干预</text>
  </g>
  <text x="760" y="908" font-size="11.5" fill="#475569">① 用户提交目标 → ② 规划器(模板/LLM)出 Plan → ③ 人审确认+成本 → ④ Temporal 派发</text>
  <text x="760" y="930" font-size="11.5" fill="#475569">⑤ 无状态 Worker 运行时注入 上下文切片/技能/模型配置+短时凭证 → ⑥ HTTP 连接器调模型</text>
  <text x="760" y="952" font-size="11.5" fill="#475569">⑦ 产物写共享卷 → ⑧ 结果信封回 Context Manager → 写 DB 台账 → ⑨ 人审断点/signal 干预</text>

  <!-- ===== 各部分实现要点 ===== -->
  <rect x="160" y="998" width="1300" height="312" rx="10" fill="#fbfdff" stroke="#dbe4ee"/>
  <text x="180" y="1026" font-size="15" font-weight="700" fill="#0f172a">各部分实现要点</text>
  <g font-size="11.5" fill="#334155">
    <text x="180" y="1056"><tspan font-weight="700" fill="#0369a1">角色注册表 </tspan>— PostgreSQL：{提示词+技能+能力+executor}</text>
    <text x="180" y="1086"><tspan font-weight="700" fill="#0369a1">模板库 </tspan>— Plan(DAG) 模板，版本化 + 语义检索</text>
    <text x="180" y="1116"><tspan font-weight="700" fill="#0369a1">规划器 </tspan>— LLM 拆解 + 模板填充 → 统一 Plan schema</text>
    <text x="180" y="1146"><tspan font-weight="700" fill="#0369a1">人审 UI </tspan>— Web/移动端；看 Plan+成本，signal 干预</text>
    <text x="180" y="1176"><tspan font-weight="700" fill="#b45309">Temporal </tspan>— Workflow=任务 / Activity=执行 / 重试·暂停·signal</text>
    <text x="180" y="1206"><tspan font-weight="700" fill="#15803d">Context Manager </tspan>— 服务+DB；切片下发·收信封·台账(出处)</text>
    <text x="180" y="1236"><tspan font-weight="700" fill="#15803d">Skill 库 </tspan>— 卷存 SKILL.md + DB 元数据；发布强制人审</text>
    <text x="180" y="1266"><tspan font-weight="700" fill="#15803d">验证沙箱 </tspan>— 断言 + LLM-as-judge；受限跑样例；人审升档</text>

    <text x="775" y="1056"><tspan font-weight="700" fill="#be185d">lite-agent（默认） </tspan>— 自研轻量循环：skill 手册 + 模型 tool-calling + 小工具集</text>
    <text x="775" y="1086"><tspan font-weight="700" fill="#be185d">纯LLM / 媒体 / hermes </tspan>— 一次调用 / 图视频服务 / 仅特定能力 spawn</text>
    <text x="775" y="1116"><tspan font-weight="700" fill="#6d28d9">Model Router </tspan>— 声明式 HTTP 连接器；按能力+预算选模型</text>
    <text x="775" y="1146"><tspan font-weight="700" fill="#6d28d9">Credential Broker </tspan>— 信封加密；Vault/KMS↔本地加密；tmpfs 即焚</text>
    <text x="775" y="1176"><tspan font-weight="700" fill="#6d28d9">模型后端 </tspan>— BYO-Key 用户付费；连接器 + 长尾薄适配器</text>
    <text x="775" y="1206"><tspan font-weight="700" fill="#334155">共享卷 </tspan>— RWX PVC（本地 hostPath）；任意模态产物</text>
    <text x="775" y="1236"><tspan font-weight="700" fill="#334155">DB </tspan>— PostgreSQL；角色/计划/台账(JSONB)/凭证密文</text>
    <text x="775" y="1266"><tspan font-weight="700" fill="#334155">检索工具 </tspan>— Role A 用 browser-pilot 类隔离浏览器(可复用)</text>
  </g>
  <text x="180" y="1296" font-size="11" fill="#64748b">说明：lite-agent 为默认执行器（去 hermes 化）；skill 是 Markdown，与运行时无关；本地先用 docker-compose + volume，生产上 k8s + Vault/KMS + 对象存储。</text>
  <text x="180" y="1316" font-size="11" fill="#64748b">本轮新增：角色编配器(意图→预设/组装/生成→建Org) · 组织Org(花名册+资源+治理+三层记忆,管理边界非执行) · 公司看板(状态可观测) · 多角色返工闭环 · 每角色最小权限.</text>
  </g>
</svg>
