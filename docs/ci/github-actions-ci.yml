name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"

permissions:
  contents: read

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: polis
          POSTGRES_PASSWORD: polis
          POSTGRES_DB: polis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polis -d polis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      POLIS_ENV: test
      POLIS_DATABASE_URL: postgresql+asyncpg://polis:polis@localhost:5432/polis
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src

      - name: Alembic migration drift
        run: |
          uv run alembic upgrade head
          uv run alembic check

      - name: Pytest
        run: uv run pytest

      - name: Bandit
        run: uv run bandit -q -r src

      - name: pip-audit
        run: uv run pip-audit

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build
