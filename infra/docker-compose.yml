# Polis 本地基础设施 + 可选应用服务（MVP，单机）。见 docs/design/07 §3、docs/constraints/14。
# 默认只起基础设施；应用本体通过 `--profile app` 启用。
# 起基础设施：cd infra && cp .env.example .env && docker compose up -d
# 起整栈：docker compose --env-file .env --profile app up -d
name: polis

x-backend-env: &backend-env
  POLIS_ENV: ${POLIS_ENV:-dev}
  POLIS_JWT_SECRET: ${POLIS_JWT_SECRET:-dev-only-insecure-secret-change-in-prod-0123456789}
  POLIS_KMS_MASTER_KEY: ${POLIS_KMS_MASTER_KEY:-}
  POLIS_CORS_ORIGINS: ${POLIS_CORS_ORIGINS:-["http://localhost:3000","http://localhost:3001","http://localhost:3002","http://localhost:3003","http://localhost:3004","http://localhost:3005","http://127.0.0.1:3000","http://127.0.0.1:3001","http://127.0.0.1:3002","http://127.0.0.1:3003","http://127.0.0.1:3004","http://127.0.0.1:3005"]}
  POLIS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-polis}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-polis}
  POLIS_TEMPORAL_ADDR: temporal:7233
  POLIS_EMBEDDING_BASE_URL: http://text-embeddings:80
  POLIS_MINIO_ENDPOINT: minio:9000
  POLIS_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-polis}
  POLIS_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  POLIS_MINIO_SECURE: "false"
  POLIS_LANGFUSE_ENABLED: ${POLIS_LANGFUSE_ENABLED:-true}
  POLIS_LANGFUSE_HOST: http://langfuse:3000
  POLIS_LANGFUSE_PUBLIC_KEY: ${LANGFUSE_INIT_PUBLIC_KEY:-}
  POLIS_LANGFUSE_SECRET_KEY: ${LANGFUSE_INIT_SECRET_KEY:-}
  POLIS_DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}

services:
  postgres:
    image: pgvector/pgvector:pg18  # PG 主版本锁定；本地为华为云 retag 镜像无 registry digest（TD-004 备注）
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 infra/.env 设置}
      POSTGRES_DB: ${POSTGRES_DB:-polis}
    ports: ["5432:5432"]
    volumes:
      # pg18+ 数据目录约定：挂在 /var/lib/postgresql（镜像会自动放到版本子目录）
      - pgdata:/var/lib/postgresql
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/10-init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polis} -d ${POSTGRES_DB:-polis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${POSTGRES_USER:-polis}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    ports: ["7233:7233"]

  temporal-ui:
    image: temporalio/ui:2.31.2
    restart: unless-stopped
    depends_on: [temporal]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ["8233:8080"]

  text-embeddings:
    # 本地 embedding：bge-large-zh-v1.5（1024 维，匹配 memory.embedding VECTOR(1024)；中文强）。
    # arm64 镜像走华为云镜像源（官方 ghcr TEI 无 arm64 manifest，Apple Silicon 用此）。
    # 模型预下载到 ./tei-models 挂载（hf-mirror 不返回 etag，TEI 在线下载会失败，故离线挂载）。
    # 预下载：HF_ENDPOINT=https://hf-mirror.com huggingface-cli download BAAI/bge-large-zh-v1.5 \
    #   --local-dir infra/tei-models/bge-large-zh-v1.5
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/ghcr.io/huggingface/text-embeddings-inference:cpu-arm64-latest-linuxarm64
    restart: unless-stopped
    command: ["--model-id", "/data/models/bge-large-zh-v1.5"]
    volumes:
      - ./tei-models:/data/models:ro  # 预下载的模型（离线加载）
    ports: ["8082:80"]

  litellm:
    image: ghcr.io/berriai/litellm:v1.89.2  # 固定版本（TD-004，原 main-stable 为滚动 tag）
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?请在 infra/.env 设置}
      DATABASE_URL: postgresql://${POSTGRES_USER:-polis}:${POSTGRES_PASSWORD}@postgres:5432/litellm
    volumes:
      - ./litellm.yaml:/app/config.yaml:ro
    ports: ["4000:4000"]

  langfuse:
    image: langfuse/langfuse:2.95.11  # 固定版本（TD-004，原 :2 为 major 浮动 tag）
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-polis}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001  # 端口 3001 避让前端 dev(3000)
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?请在 infra/.env 设置}
      SALT: ${LANGFUSE_SALT:?请在 infra/.env 设置}
      TELEMETRY_ENABLED: "false"
      # headless 初始化（开箱即用，无需手动登录建 project；Polis 用同一对 keys 自动接入）
      LANGFUSE_INIT_ORG_ID: polis
      LANGFUSE_INIT_ORG_NAME: Polis
      LANGFUSE_INIT_PROJECT_ID: polis-dev
      LANGFUSE_INIT_PROJECT_NAME: "Polis Dev"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PUBLIC_KEY:?请在 infra/.env 设置}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_SECRET_KEY:?请在 infra/.env 设置}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@polis.local}
      LANGFUSE_INIT_USER_NAME: "Polis Admin"
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:?请在 infra/.env 设置}
    ports: ["3001:3000"]

  minio:
    # 对象存储（V2-P2a）：附件输入 + 结果产物。单桶 + key 前缀 {org_id}/{task_id}/ 隔离。
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z  # 固定版本（TD-004，避免滚动 tag）
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-polis}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?请在 infra/.env 设置}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"  # S3 API（backend 走此端口）
      - "9001:9001"  # Web 控制台 http://localhost:9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles: ["app"]
    image: polis-api:local
    build:
      context: ../backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      <<: *backend-env
    command: ["sh", "-c", "alembic upgrade head && uvicorn polis.main:app --host 0.0.0.0 --port 8000"]
    ports: ["8000:8000"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    profiles: ["app"]
    image: polis-api:local
    build:
      context: ../backend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      <<: *backend-env
    command: ["python", "-m", "polis.modules.planner.worker"]

  web:
    profiles: ["app"]
    image: polis-web:local
    build:
      context: ../frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports: ["3000:3000"]

volumes:
  pgdata:
  miniodata:
