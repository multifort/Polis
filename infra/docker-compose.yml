# Polis 本地基础设施（MVP，单机）。见 docs/design/07 §3、docs/constraints/14。
# 仅 4 个外部依赖；Polis 应用本体仍用 backend 的 `make dev` 本地跑（容器化属 E8，后置）。
# 起栈：cd infra && cp .env.example .env && docker compose up -d   （本次不拉起）
name: polis

services:
  postgres:
    image: pgvector/pgvector:pg18  # PG 主版本锁定；本地为华为云 retag 镜像无 registry digest（TD-004 备注）
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 infra/.env 设置}
      POSTGRES_DB: ${POSTGRES_DB:-polis}
    ports: ["5432:5432"]
    volumes:
      # pg18+ 数据目录约定：挂在 /var/lib/postgresql（镜像会自动放到版本子目录）
      - pgdata:/var/lib/postgresql
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/10-init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polis} -d ${POSTGRES_DB:-polis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${POSTGRES_USER:-polis}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    ports: ["7233:7233"]

  temporal-ui:
    image: temporalio/ui:2.31.2
    restart: unless-stopped
    depends_on: [temporal]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ["8233:8080"]

  text-embeddings:
    # 本地 embedding：bge-large-zh-v1.5（1024 维，匹配 memory.embedding VECTOR(1024)；中文强）。
    # arm64 镜像走华为云镜像源（官方 ghcr TEI 无 arm64 manifest，Apple Silicon 用此）。
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/ghcr.io/huggingface/text-embeddings-inference:cpu-arm64-latest-linuxarm64
    restart: unless-stopped
    command: ["--model-id", "BAAI/bge-large-zh-v1.5"]
    environment:
      HF_ENDPOINT: https://hf-mirror.com  # 国内加速首次模型下载（~1.3GB）
    volumes:
      - tei-cache:/data  # 缓存模型，避免重启重下
    ports: ["8082:80"]

  litellm:
    image: ghcr.io/berriai/litellm:v1.89.2  # 固定版本（TD-004，原 main-stable 为滚动 tag）
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?请在 infra/.env 设置}
      DATABASE_URL: postgresql://${POSTGRES_USER:-polis}:${POSTGRES_PASSWORD}@postgres:5432/litellm
    volumes:
      - ./litellm.yaml:/app/config.yaml:ro
    ports: ["4000:4000"]

  langfuse:
    image: langfuse/langfuse:2.95.11  # 固定版本（TD-004，原 :2 为 major 浮动 tag）
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-polis}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?请在 infra/.env 设置}
      SALT: ${LANGFUSE_SALT:?请在 infra/.env 设置}
      TELEMETRY_ENABLED: "false"
    ports: ["3000:3000"]

volumes:
  pgdata:
  tei-cache:
